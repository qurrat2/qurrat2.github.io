title: Qurrat-ul-Ain Rubab
email: qurrat.rubab@gmail.com
baseurl: ""
url: "https://qurrat2.github.io"

theme: minima

permalink: /:year/:month/:day/:title/

minima:
  skin: auto
  social_links:
    - platform: github
      user_url: "https://github.com/qurrat2"
    - platform: linkedin
      user_url: "https://linkedin.com/in/qurrat2"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_excerpts: true

giscus:
  repo: qurrat2/qurrat2.github.io
  repo_id: REPLACE_ME
  category: General
  category_id: REPLACE_ME
  mapping: pathname
  reactions_enabled: 1
  theme: preferred_color_scheme

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
